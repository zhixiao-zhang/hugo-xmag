{{ partial "header.html" . }}

<div class="container terms-page">
<article>
<main>
  {{ $exclude := site.Params.terms_exclude | default (slice) }}
  <ul class="terms-grid">
    {{ range .Data.Terms.ByCount }}
    {{ if not (in $exclude .Term) }}
    <li class="terms-card">
      <a href="{{ absLangURL (print "/" $.Data.Plural "/" .Term | urlize) }}" class="terms-card-link">
        <div class="terms-card-top">
          <span class="terms-name">{{ .Term }}</span>
          <span class="terms-count">{{ i18n "post_count" .Count }}</span>
        </div>
        <span class="terms-cta">{{ i18n "view" }}</span>
      </a>
    </li>
    {{ end }}
    {{ end }}
  </ul>
</main>
</article>
</div>

{{ partial "footer.html" . }}
